services:
    app:
        container_name: portal-api
        build:
            context: '../../docker/php'
            dockerfile: Dockerfile
            args:
                WWWUSER: '${WWWUSER:-1000}'
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'dailyapps/php:8.5'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '.:/var/www/html'
        networks:
            - dailyapps
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.portal-api.rule=Host(`portal-api.localhost`)'
            - 'traefik.http.routers.portal-api.entrypoints=web'
            - 'traefik.http.services.portal-api.loadbalancer.server.port=80'

    horizon:
        container_name: portal-horizon
        image: 'dailyapps/php:8.5'
        restart: unless-stopped
        command: php artisan horizon
        healthcheck:
            test: ['CMD', 'php', 'artisan', 'horizon:status']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '.:/var/www/html'
        networks:
            - dailyapps
        depends_on:
            - app

    scheduler:
        container_name: portal-scheduler
        image: 'dailyapps/php:8.5'
        restart: unless-stopped
        command: php artisan schedule:work
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '.:/var/www/html'
        networks:
            - dailyapps
        depends_on:
            - app

networks:
    dailyapps:
        external: true
        name: dailyapps
