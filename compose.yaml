# Only the app container lives here. All backing services (mysql, redis,
# meilisearch, rustfs, mailpit) come from the shared root stack and are
# reached over the external "dailyapps" network. Start the root stack first.
services:
    app:
        container_name: portal-api
        build:
            context: '../docker/php'
            dockerfile: Dockerfile
            args:
                WWWUSER: '${WWWUSER:-1000}'
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'dailyapps/php:8.5'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        volumes:
            - '.:/var/www/html'
        networks:
            - dailyapps

networks:
    dailyapps:
        external: true
        name: dailyapps
