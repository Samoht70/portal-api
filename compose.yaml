# Only the app container lives here. All backing services (mysql, redis,
# meilisearch, rustfs, mailpit) come from the shared root stack and are
# reached over the external "dailyapps" network. Start the root stack first.
# Served at http://portal-api.localhost by the shared Traefik ingress (no host
# port published for HTTP — Traefik reaches port 80 over the network).
services:
    app:
        container_name: portal-api
        build:
            context: '../../docker/php'
            dockerfile: Dockerfile
            args:
                WWWUSER: '${WWWUSER:-1000}'
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'dailyapps/php:8.5'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        # API only — no host ports. Reached over the network by Traefik.
        volumes:
            - '.:/var/www/html'
        networks:
            - dailyapps
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.portal-api.rule=Host(`portal-api.localhost`)'
            - 'traefik.http.routers.portal-api.entrypoints=web'
            - 'traefik.http.services.portal-api.loadbalancer.server.port=80'

networks:
    dailyapps:
        external: true
        name: dailyapps
